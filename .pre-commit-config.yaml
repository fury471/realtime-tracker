# Pre-commit hooks — run automatically before every git commit.
# Install once with: python -m pre_commit install
# Run manually on all files: python -m pre_commit run --all-files

repos:
  # Black — code formatter
  # Reformats Python code to a consistent style automatically
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3

  # Ruff — linter and import sorter
  # Catches bugs, unused imports, wrong naming, unsorted imports
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]

  # General file hygiene
  # These catch common mistakes that waste time in code review
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace       # remove invisible trailing spaces
      - id: end-of-file-fixer         # ensure files end with a newline
      - id: check-yaml                # catch broken yaml syntax early
      - id: check-toml                # catch broken toml syntax early
      - id: check-merge-conflict      # block commits with <<<< markers
      - id: check-added-large-files   # warn if you accidentally add a 500MB model
        args: [--maxkb=1000]
